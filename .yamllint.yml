# yamllint — style rules for a GitHub-Actions-heavy repo.
extends: default

rules:
  # `on:` is a mapping key in every workflow; don't flag it as a boolean.
  truthy:
    check-keys: false
  document-start: disable
  line-length:
    max: 120
    level: warning
  comments:
    min-spaces-from-content: 1
