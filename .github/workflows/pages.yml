# Deploys the static docs site (docs/) to GitHub Pages.
#
# One-time setup: Settings → Pages → Source → "GitHub Actions".
name: Pages

on:
  push:
    branches: [main]
    paths:
      - docs/**
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions: {}

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Pages races CI on the same push, so the reusable gate waits for the
  # commit's checks and refuses to ship docs from a red build.
  verify-ci:
    uses: ./.github/workflows/verify-ci.yml
    permissions:
      checks: read

  deploy:
    needs: verify-ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write # deploy to Pages
      id-token: write # OIDC token that deploy-pages verifies
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
