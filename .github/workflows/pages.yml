# Deploys the static docs site (docs/) to GitHub Pages.
#
# One-time setup: Settings → Pages → Source → "GitHub Actions".
name: Pages

on:
  push:
    branches: [main]
    paths:
      - docs/**
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions: {}

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Pages races CI on the same push, so wait for the commit's checks and
  # refuse to ship docs from a red build. Mirrors verify-ci in release.yml.
  verify-ci:
    runs-on: ubuntu-latest
    permissions:
      checks: read
    steps:
      - name: Wait for green CI on this commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          required="lint test smoke"
          deadline=$((SECONDS + 1200))
          while true; do
            runs=$(gh api "repos/$GITHUB_REPOSITORY/commits/$GITHUB_SHA/check-runs?per_page=100" \
              --jq '[.check_runs[] | {name, status, conclusion, started_at}]')
            pending=0 failed="" missing=""
            for name in $required; do
              row=$(jq --arg n "$name" \
                '[.[] | select(.name == $n)] | sort_by(.started_at) | last' <<<"$runs")
              if [ "$row" = "null" ]; then
                missing="$missing $name"
              elif [ "$(jq -r .status <<<"$row")" != "completed" ]; then
                pending=1
              elif [ "$(jq -r .conclusion <<<"$row")" != "success" ]; then
                failed="$failed $name"
              fi
            done
            if [ -n "$failed" ]; then
              echo "::error::checks not green on $GITHUB_SHA:$failed"
              exit 1
            fi
            if [ -z "$missing" ] && [ "$pending" -eq 0 ]; then
              echo "All required checks are green on $GITHUB_SHA."
              exit 0
            fi
            if [ "$SECONDS" -ge "$deadline" ]; then
              echo "::error::timed out waiting for checks on $GITHUB_SHA (missing:${missing:- none})"
              exit 1
            fi
            sleep 30
          done

  deploy:
    needs: verify-ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write # deploy to Pages
      id-token: write # OIDC token that deploy-pages verifies
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
