# tonk eats its own dog food: the same thin caller every consumer repo has.
# This one tracks main so breakage shows up here before it ships to @v2.
name: tonk

on:
  workflow_run:
    workflows: [CI, Pages, Release]
    types: [completed]
  pull_request:
    types: [opened, reopened, closed]

permissions:
  actions: read
  contents: read # reads .github/discord.yml

jobs:
  notify:
    if: github.event_name == 'workflow_run'
    uses: zandoh/tonk/.github/workflows/notify.yml@main
    secrets:
      webhook: ${{ secrets.TONK_DISCORD_WEBHOOK }}

  pr:
    if: github.event_name == 'pull_request'
    uses: zandoh/tonk/.github/workflows/pr.yml@main
    secrets:
      webhook: ${{ secrets.TONK_DISCORD_WEBHOOK }}
