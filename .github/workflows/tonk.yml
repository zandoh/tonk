# tonk eats its own dog food: the same thin caller every consumer repo has.
# This one tracks main so breakage shows up here before it ships to @v2.
name: tonk

on:
  workflow_run:
    workflows: [CI, Pages, Release]
    types: [completed]
  pull_request:
    types: [opened, reopened, closed]
  issues:
    types: [opened, reopened, closed]
  release:
    types: [published]

permissions:
  actions: read
  contents: read # reads .github/discord.yml

jobs:
  notify:
    if: github.event_name == 'workflow_run'
    uses: zandoh/tonk/.github/workflows/notify.yml@main
    secrets:
      webhook: ${{ secrets.TONK_DISCORD_WEBHOOK }}

  pr:
    if: github.event_name == 'pull_request'
    uses: zandoh/tonk/.github/workflows/pr.yml@main
    secrets:
      webhook: ${{ secrets.TONK_DISCORD_WEBHOOK }}

  issues:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - uses: zandoh/tonk@main
        with:
          webhook-url: ${{ secrets.TONK_DISCORD_WEBHOOK }}
          title: "🎫 Issue #${{ github.event.issue.number }} ${{ github.event.action }}"
          description: ${{ github.event.issue.title }} (by ${{ github.event.issue.user.login }})
          url: ${{ github.event.issue.html_url }}
          color: "16756480"

  # tonk publishes GitHub Releases by hand, so they're user-authored and the
  # `release` event does fire here — unlike a GITHUB_TOKEN-published release.
  release:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Prepare release notes
        id: notes
        env:
          NOTES: ${{ github.event.release.body }}
        run: |
          {
            echo 'body<<TONK_NOTES_EOF'
            # Discord embeds don't render markdown headers; bold them instead.
            printf '%s' "$NOTES" | sed -E 's/^#+ +(.*)$/**\1**/'
            echo
            echo TONK_NOTES_EOF
          } >> "$GITHUB_OUTPUT"

      - name: Announce release on Discord
        uses: zandoh/tonk@main
        with:
          webhook-url: ${{ secrets.TONK_DISCORD_WEBHOOK }}
          title: 🚀 tonk ${{ github.event.release.tag_name }} released
          description: ${{ steps.notes.outputs.body }}
          url: ${{ github.event.release.html_url }}
          color: "5793266"
