# Moves the major tag (v2) after a release tag proves itself green.
#
# The major tag is the action's real deploy: every consumer pins @v2, so a
# bad move breaks the whole fleet at once. Pushing v2.x.y lands here, which
# waits for the tagged commit's CI checks and only then points the major
# tag at it. Never move the major tag by hand.
#
# No recursion: the API ref update fires a push event for the major tag
# (no dots, doesn't match v*.*.*), and GITHUB_TOKEN pushes don't trigger
# workflows anyway.
name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions: {}

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # A release tag usually lands moments after the commit itself, so the CI
  # checks may still be running: poll until they all conclude. A commit CI
  # never saw (no check runs after the timeout) does not release.
  verify-ci:
    runs-on: ubuntu-latest
    permissions:
      checks: read
    steps:
      - name: Wait for green CI on the tagged commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          required="lint test smoke"
          deadline=$((SECONDS + 1200))
          while true; do
            runs=$(gh api "repos/$GITHUB_REPOSITORY/commits/$GITHUB_SHA/check-runs?per_page=100" \
              --jq '[.check_runs[] | {name, status, conclusion, started_at}]')
            pending=0 failed="" missing=""
            for name in $required; do
              row=$(jq --arg n "$name" \
                '[.[] | select(.name == $n)] | sort_by(.started_at) | last' <<<"$runs")
              if [ "$row" = "null" ]; then
                missing="$missing $name"
              elif [ "$(jq -r .status <<<"$row")" != "completed" ]; then
                pending=1
              elif [ "$(jq -r .conclusion <<<"$row")" != "success" ]; then
                failed="$failed $name"
              fi
            done
            if [ -n "$failed" ]; then
              echo "::error::checks not green on $GITHUB_SHA:$failed"
              exit 1
            fi
            if [ -z "$missing" ] && [ "$pending" -eq 0 ]; then
              echo "All required checks are green on $GITHUB_SHA."
              exit 0
            fi
            if [ "$SECONDS" -ge "$deadline" ]; then
              echo "::error::timed out waiting for checks on $GITHUB_SHA (missing:${missing:- none})"
              exit 1
            fi
            sleep 30
          done

  move-major-tag:
    needs: verify-ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Point the major tag at this release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          major=${GITHUB_REF_NAME%%.*}
          if gh api --silent "repos/$GITHUB_REPOSITORY/git/refs/tags/$major" 2>/dev/null; then
            gh api --silent -X PATCH "repos/$GITHUB_REPOSITORY/git/refs/tags/$major" \
              -f sha="$GITHUB_SHA" -F force=true
          else
            gh api --silent -X POST "repos/$GITHUB_REPOSITORY/git/refs" \
              -f ref="refs/tags/$major" -f sha="$GITHUB_SHA"
          fi
          echo "$major -> $GITHUB_SHA"
